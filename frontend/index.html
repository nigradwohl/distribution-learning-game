<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIT Verteilungslernen - Lobby</title>
    <!-- Einbindung eines einfachen CSS-Frameworks für schnelles, gutes Aussehen -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .lobby-card { max-width: 500px; width: 100%; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="card lobby-card p-4 bg-white">
    <div class="text-center mb-4">
        <h2 class="text-primary">Forschungsprojekt</h2>
        <p class="text-muted">Wahrnehmung von statistischen Verteilungen</p>
    </div>

    <!-- Namenseingabe -->
    <div class="mb-4">
        <label for="username" class="form-label fw-bold">Dein Spielername / Kürzel:</label>
        <input type="text" id="username" class="form-control form-control-lg" placeholder="z.B. Studi123" required>
        <div id="name-warning" class="text-danger small mt-1" style="display: none;">Bitte gib einen Namen ein, um fortzufahren!</div>
    </div>

    <hr>

    <!-- Spielerauswahl -->
    <h5 class="mb-3 fw-bold">Wähle ein Minispiel:</h5>
    <div class="d-grid gap-3">
        <button onclick="startGame('game1')" class="btn btn-outline-primary btn-lg text-start p-3">
            <strong>🎮 Spiel 1: Risiko-Schätzer</strong>
            <br><small class="text-muted">Teste deine Intuition bei kontinuierlichen Gewinnspannen.</small>
        </button>
        <button onclick="startGame('game2')" class="btn btn-outline-success btn-lg text-start p-3">
            <strong>📊 Spiel 2: Die Bimodale Falle</strong>
            <br><small class="text-muted">Erkenne versteckte Muster in scheinbar zufälligen Zahlen.</small>
        </button>
    </div>
</div>

<script src="js/lobby.js"></script>
</body>
</html>
