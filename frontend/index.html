<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIT Verteilungslernen - Lobby</title>
    <!-- Einbindung eines einfachen CSS-Frameworks für schnelles, gutes Aussehen -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .lobby-card { max-width: 500px; width: 100%; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="card lobby-card p-4 bg-white">
    <div class="text-center mb-4">
        <h2 class="text-primary">Forschungsprojekt</h2>
        <p class="text-muted">Wahrnehmung von statistischen Verteilungen</p>
    </div>

    <!-- Namenseingabe -->
    <div class="mb-4">
        <label for="username" class="form-label fw-bold">Dein Spielername / Kürzel:</label>
        <input type="text" id="username" class="form-control form-control-lg" placeholder="z.B. Studi123" required>
        <div id="name-warning" class="text-danger small mt-1" style="display: none;">Bitte gib einen Namen ein, um fortzufahren!</div>
    </div>

    <div class="d-grid gap-2">
        <button id="confirm-button" class="btn btn-primary btn-lg" onclick="confirmName()">Name bestätigen</button>
        <div id="result-message" class="text-success small" style="display:none;">Der Name wurde erfolgreich gespeichert.</div>
    </div>
</div>

<script>
function submitNameToServer(name) {
    return fetch('/submit-name', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name })
    });
}

function confirmName() {
    const nameEl = document.getElementById('username');
    const warning = document.getElementById('name-warning');
    const result = document.getElementById('result-message');
    const button = document.getElementById('confirm-button');
    const name = nameEl.value.trim();
    if (!name) {
        warning.style.display = 'block';
        result.style.display = 'none';
        return;
    }
    warning.style.display = 'none';
    button.disabled = true;
    submitNameToServer(name).then(resp => {
        button.disabled = false;
        if (resp.ok) {
            result.textContent = 'Der Name wurde erfolgreich gespeichert.';
            result.className = 'text-success small';
            result.style.display = 'block';
        } else {
            resp.json().then(j => {
                result.textContent = 'Serverfehler: ' + (j.error || resp.statusText);
                result.className = 'text-danger small';
                result.style.display = 'block';
            });
        }
    }).catch(err => {
        button.disabled = false;
        result.textContent = 'Anfrage fehlgeschlagen: ' + err.message;
        result.className = 'text-danger small';
        result.style.display = 'block';
    });
}
</script>
</body>
</html>
